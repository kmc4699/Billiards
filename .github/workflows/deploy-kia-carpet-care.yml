# Deploy the Kia Carpet Care static website to GitHub Pages
name: Deploy Kia Carpet Care

on:
  push:
    branches: [main]
    paths:
      - 'kia-carpet-care/**'
      - '.github/workflows/deploy-kia-carpet-care.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload website
        uses: actions/upload-pages-artifact@v3
        with:
          path: './kia-carpet-care'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
